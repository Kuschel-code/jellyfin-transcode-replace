name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build Jellyfin.Plugin.TranscodeReplace/Jellyfin.Plugin.TranscodeReplace.csproj -c Release

      - name: Package plugin
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DLL="Jellyfin.Plugin.TranscodeReplace/bin/Release/net8.0/Jellyfin.Plugin.TranscodeReplace.dll"
          mkdir -p package
          cp "$DLL" package/
          cd package
          ZIP="transcode-replace_${VERSION}.zip"
          zip "$ZIP" Jellyfin.Plugin.TranscodeReplace.dll
          MD5=$(md5sum "$ZIP" | awk '{print $1}')
          echo "$MD5" > "${ZIP}.md5"
          echo "### Plugin package" >> "$GITHUB_STEP_SUMMARY"
          echo "- file: \`$ZIP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- md5: \`$MD5\` (use this checksum in the repository manifest)" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            package/*.zip
            package/*.md5
