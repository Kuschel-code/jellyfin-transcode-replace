name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build Jellyfin.Plugin.TranscodeReplace/Jellyfin.Plugin.TranscodeReplace.csproj -c Release

      - name: Package plugin
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GUID="eff73e61-0320-4bce-bb2c-27fb68604e9d"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DLL="Jellyfin.Plugin.TranscodeReplace/bin/Release/net9.0/Jellyfin.Plugin.TranscodeReplace.dll"

          mkdir -p package
          cp "$DLL" package/

          # meta.json so the zip is a valid Jellyfin plugin folder (no .pdb / .deps.json).
          printf '%s' "{\"category\":\"General\",\"guid\":\"$GUID\",\"name\":\"Transcode & Replace\",\"description\":\"Batch-transcode library media to HEVC/AV1 and atomically replace the original.\",\"overview\":\"Transcode library media and replace the originals, with verification gates.\",\"owner\":\"Kuschel-code\",\"targetAbi\":\"10.11.0.0\",\"framework\":\"net9.0\",\"version\":\"${VERSION}.0\",\"changelog\":\"Release ${VERSION}\",\"timestamp\":\"$TS\"}" > package/meta.json

          cd package
          ZIP="transcode-replace_${VERSION}.zip"
          zip "$ZIP" Jellyfin.Plugin.TranscodeReplace.dll meta.json
          MD5="$(md5sum "$ZIP" | awk '{print $1}')"
          echo "$MD5" > "${ZIP}.md5"
          {
            echo "### Plugin package"
            echo "- file: \`$ZIP\` (Jellyfin.Plugin.TranscodeReplace.dll + meta.json)"
            echo "- md5: \`$MD5\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            package/*.zip
            package/*.md5
