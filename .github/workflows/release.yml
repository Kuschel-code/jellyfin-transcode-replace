name: Release

# Fully automated release, triggered by editing the RELEASE file on main.
#
# RELEASE format:
#   line 1     -> version, e.g. 0.0.4 (no leading v)
#   lines 2..n -> changelog (shown in the GitHub release and the plugin catalog)
#
# Commit a new RELEASE to main and the workflow does the rest: bump the
# csproj/build.yaml version, build, package the zip, compute the md5, publish a
# GitHub release with the zip, and update manifest.json on main with the real
# checksum and download URL. Nothing to do by hand. Re-releasing a version
# overwrites its manifest entry idempotently.

on:
  push:
    branches: [ main ]
    paths: [ 'RELEASE' ]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version and changelog from RELEASE
        id: meta
        run: |
          set -euo pipefail
          if [ ! -f RELEASE ]; then
            echo "::error::RELEASE file is missing"
            exit 1
          fi
          VERSION="$(head -n 1 RELEASE | tr -d '[:space:]')"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::first line of RELEASE must be a version like 1.2.3 (got '$VERSION')"
            exit 1
          fi
          CL="${RUNNER_TEMP}/changelog.txt"
          tail -n +2 RELEASE | sed '/^[[:space:]]*$/d' > "$CL"
          if ! grep -q '[^[:space:]]' "$CL"; then
            printf 'Release v%s\n' "$VERSION" > "$CL"
          fi
          {
            echo "tag=v$VERSION"
            echo "version=$VERSION"
            echo "version4=${VERSION}.0"
            echo "changelog_file=$CL"
          } >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Bump version in csproj and build.yaml
        run: |
          set -euo pipefail
          V4="${{ steps.meta.outputs.version4 }}"
          CSPROJ="Jellyfin.Plugin.TranscodeReplace/Jellyfin.Plugin.TranscodeReplace.csproj"
          BUILD="Jellyfin.Plugin.TranscodeReplace/build.yaml"
          sed -i -E "s#<AssemblyVersion>[0-9.]+</AssemblyVersion>#<AssemblyVersion>${V4}</AssemblyVersion>#" "$CSPROJ"
          sed -i -E "s#<FileVersion>[0-9.]+</FileVersion>#<FileVersion>${V4}</FileVersion>#" "$CSPROJ"
          sed -i -E "s#^version: \".*\"#version: \"${V4}\"#" "$BUILD"

      - name: Build
        run: dotnet build Jellyfin.Plugin.TranscodeReplace/Jellyfin.Plugin.TranscodeReplace.csproj -c Release

      - name: Package plugin and compute checksum
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          V4="${{ steps.meta.outputs.version4 }}"
          ABI="10.11.0.0"
          GUID="eff73e61-0320-4bce-bb2c-27fb68604e9d"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DLL="Jellyfin.Plugin.TranscodeReplace/bin/Release/net9.0/Jellyfin.Plugin.TranscodeReplace.dll"
          CHANGELOG="$(cat "${{ steps.meta.outputs.changelog_file }}")"

          mkdir -p package
          cp "$DLL" package/

          # meta.json so the zip is a valid Jellyfin plugin folder (no .pdb / .deps.json).
          jq -n \
            --arg guid "$GUID" --arg abi "$ABI" --arg v "$V4" \
            --arg cl "$CHANGELOG" --arg ts "$TS" \
            '{category:"General", guid:$guid, name:"Transcode & Replace",
              description:"Batch-transcode library media to HEVC/AV1/VP9 and atomically replace the original.",
              overview:"Transcode library media and replace the originals, with verification gates.",
              owner:"Kuschel-code", targetAbi:$abi, framework:"net9.0",
              version:$v, changelog:$cl, timestamp:$ts}' > package/meta.json

          cd package
          ZIP="transcode-replace_${VERSION}.zip"
          zip "$ZIP" Jellyfin.Plugin.TranscodeReplace.dll meta.json
          MD5="$(md5sum "$ZIP" | awk '{print $1}')"
          echo "$MD5" > "${ZIP}.md5"
          {
            echo "zip=$ZIP"
            echo "md5=$MD5"
            echo "ts=$TS"
            echo "abi=$ABI"
          } >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          set -euo pipefail
          V4="${{ steps.meta.outputs.version4 }}"
          ABI="${{ steps.pkg.outputs.abi }}"
          MD5="${{ steps.pkg.outputs.md5 }}"
          TS="${{ steps.pkg.outputs.ts }}"
          ZIP="${{ steps.pkg.outputs.zip }}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.meta.outputs.tag }}/${ZIP}"
          CHANGELOG="$(cat "${{ steps.meta.outputs.changelog_file }}")"

          # Drop any existing entry for this version (so re-releasing is idempotent),
          # then prepend the new one to the top of the versions list.
          jq \
            --arg v "$V4" --arg cl "$CHANGELOG" --arg abi "$ABI" \
            --arg url "$URL" --arg sum "$MD5" --arg ts "$TS" \
            '.[0].versions = ([{version:$v, changelog:$cl, targetAbi:$abi, sourceUrl:$url, checksum:$sum, timestamp:$ts}]
                              + (.[0].versions | map(select(.version != $v))))' \
            manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Commit version bump and manifest to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the generated changes; RELEASE is intentionally left untouched
          # so this push does not re-trigger the workflow.
          git add manifest.json Jellyfin.Plugin.TranscodeReplace/Jellyfin.Plugin.TranscodeReplace.csproj Jellyfin.Plugin.TranscodeReplace/build.yaml
          if git diff --cached --quiet; then
            echo "No manifest/version changes to commit."
          else
            git commit -m "Release ${{ steps.meta.outputs.tag }}: bump version and manifest"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: main
          body_path: ${{ steps.meta.outputs.changelog_file }}
          files: |
            package/*.zip
            package/*.md5
