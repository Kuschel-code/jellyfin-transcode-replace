version: "0.0.5.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Kuschel-code"
overview: "Batch-transcode library media to HEVC/AV1 and atomically replace the original."
description: >
  Discovers library media, transcodes it to a target codec using detected
  hardware or software encoders, verifies the result and atomically replaces
  the original file. Includes a persistent job queue, dry-run mode, backup
  policy, HDR preservation and an optional VMAF gate.
category: "General"
artifacts:
  - "Jellyfin.Plugin.TranscodeReplace.dll"
changelog: >
  0.0.3.0 - Crash-safe replace: the original is backed up by hardlink/copy and the new
  file is swapped in with one atomic rename, so the source is never empty; an interrupted
  replace is recovered on startup. 0.0.2.0 - Redesigned settings page and a History view
  with posters, codec change and size saving. 0.0.1.0 - First release.
