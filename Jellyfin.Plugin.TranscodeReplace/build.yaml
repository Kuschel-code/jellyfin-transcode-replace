changelog: >
  0.0.6.0 - Review hardening on top of 0.0.5: VMAF gate now fails closed when the score
  cannot be computed; idempotency skip when the source is already the target codec
  (self-corrects a crash-requeued job); fixed a 10-bit pixel-format false positive
  (yuv410p); logging for corrupt queue load and permission failures. 0.0.5.0 - VP9 / Opus
  / WebM support and config-page fixes. 0.0.3.0 - Crash-safe replace. 0.0.1.0 - First release.
